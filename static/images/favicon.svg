<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    /* Default Light Mode: Dark bars on light background */
    .bg { fill: #f8f9fa; }
    .chart { fill: #212529; }
    .accent { fill: #0d6efd; } /* Blue accent */

    /* Adapt to Dark Mode: Light bars on dark background */
    @media (prefers-color-scheme: dark) {
      .bg { fill: #212529; }
      .chart { fill: #f8f9fa; }
      .accent { fill: #0dcaf0; } /* Cyan accent for dark mode readability */
    }
  </style>

  <rect class="bg" width="100" height="100" rx="20" ry="20"/>

  <rect class="chart" x="20" y="60" width="15" height="25" rx="3"/>

  <rect class="chart" x="42" y="40" width="15" height="45" rx="3"/>

  <rect class="accent" x="64" y="20" width="15" height="65" rx="3"/>
</svg>
